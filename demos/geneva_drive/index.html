<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Geneva Drive Lab — InnovationLab</title><style>
:root{color-scheme:dark;--line:#28405f;--text:#eaf2ff;--muted:#9fb0cc;--cyan:#7dd3fc;--pink:#f472b6;--green:#86efac;--yellow:#fde68a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 35% -10%,#254c82,#07101e 58%);color:var(--text);font-family:Inter,system-ui,sans-serif}.shell{max-width:1120px;margin:0 auto;padding:28px}.crumb{color:var(--muted);text-decoration:none}h1{font-size:clamp(32px,5vw,56px);margin:16px 0 8px}.lead{max-width:760px;color:var(--muted);line-height:1.55;font-size:18px}.layout{display:grid;grid-template-columns:1.35fr .65fr;gap:18px;margin-top:22px}.card{background:linear-gradient(180deg,#101d33,#0a1424);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 24px 60px #0007}.stage{width:100%;min-height:610px;border-radius:18px;background:radial-gradient(circle at 50% 45%,#162a49,#06101e 72%);border:1px solid #203755}.controls{display:grid;gap:15px}.row label{display:flex;justify-content:space-between;color:var(--muted);font-size:14px;margin-bottom:8px}input{width:100%;accent-color:var(--cyan)}.btn{border:0;border-radius:999px;padding:10px 14px;background:var(--cyan);color:#06101c;font-weight:800;cursor:pointer}.readout{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{border:1px solid #213852;background:#081524;border-radius:14px;padding:10px}.metric b{display:block;color:var(--yellow)}.driver{fill:#7dd3fc;stroke:#06101c;stroke-width:2}.wheel{fill:#172554;stroke:#86efac;stroke-width:3}.slot{stroke:#f472b6;stroke-width:8;stroke-linecap:round}.pin{fill:#fde68a;stroke:#06101c;stroke-width:2}.lock{fill:none;stroke:#94a3b8;stroke-width:3;stroke-dasharray:5 6}.tag{display:inline-block;border:1px solid #355b7d;border-radius:999px;padding:4px 9px;color:#bdddff;font-size:12px;margin:4px 4px 0 0}@media(max-width:900px){.layout{grid-template-columns:1fr}.stage{min-height:440px}}
</style></head><body><main class="shell"><a class="crumb" href="../../">← InnovationLab</a><h1>Geneva Drive Lab</h1><p class="lead">Intermittent rotary indexing: a continuously rotating driver advances the Geneva wheel one slot at a time, with dwell between indexing events.</p><section class="layout"><article class="card"><svg id="stage" class="stage" viewBox="-130 -110 260 220"><g id="scene"></g></svg></article><aside class="card controls"><h2>Controls</h2><div class="row"><label><span>Slots</span><b><span id="slotsVal">6</span></b></label><input id="slots" type="range" min="4" max="8" value="6" step="1"/></div><div class="row"><label><span>Drive pin radius</span><b><span id="pinVal">38</span> mm</b></label><input id="pinR" type="range" min="28" max="50" value="38" step="1"/></div><div class="row"><label><span>Speed</span><b><span id="speedVal">1.0×</span></b></label><input id="speed" type="range" min="0" max="3" value="1" step="0.1"/></div><button id="play" class="btn">Pause</button><div class="readout"><div class="metric"><span>Index</span><b id="idxOut">0</b></div><div class="metric"><span>State</span><b id="stateOut">dwell</b></div><div class="metric"><span>Wheel angle</span><b id="angleOut">0°</b></div><div class="metric"><span>Dwell approx</span><b id="dwellOut">—</b></div></div><p><span class="tag">intermittent motion</span><span class="tag">indexing</span></p></aside></section></main><script>
const $=s=>document.querySelector(s), scene=$('#scene'), ui={slots:$('#slots'),pinR:$('#pinR'),speed:$('#speed'),play:$('#play')};let t=0,playing=true;
function slotLines(n,r){let h='';for(let i=0;i<n;i++){const a=i/n*Math.PI*2, x1=18*Math.cos(a),y1=18*Math.sin(a),x2=r*Math.cos(a),y2=r*Math.sin(a);h+=`<line class="slot" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`}return h}
function draw(){const n=+ui.slots.value,pinR=+ui.pinR.value,speed=+ui.speed.value, step=2*Math.PI/n;const phase=((t%(2*Math.PI))+2*Math.PI)%(2*Math.PI);const window=0.82;const nearest=Math.round(t/(2*Math.PI))*2*Math.PI;const local=t-nearest;const engaged=Math.abs(local)<window;const base=Math.floor((t+Math.PI)/(2*Math.PI));const progress=engaged?0.5+0.5*Math.sin(local/window*Math.PI/2):local>0?1:0;const wheelA=(base+progress)*step;const drive={x:-62,y:0};const pin={x:drive.x+pinR*Math.cos(t),y:drive.y+pinR*Math.sin(t)};scene.innerHTML=`<g transform="translate(42,0) rotate(${wheelA*180/Math.PI})"><circle class="wheel" r="66"/>${slotLines(n,58)}<circle class="lock" r="30"/></g><g transform="translate(${drive.x},${drive.y}) rotate(${t*180/Math.PI})"><circle class="driver" r="30"/><line x1="0" y1="0" x2="${pinR}" y2="0" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round"/><circle class="pin" cx="${pinR}" cy="0" r="7"/></g><circle class="pin" cx="42" cy="0" r="4"/><circle class="pin" cx="${drive.x}" cy="${drive.y}" r="4"/>`;$('#slotsVal').textContent=n;$('#pinVal').textContent=pinR;$('#speedVal').textContent=speed.toFixed(1)+'×';$('#idxOut').textContent=((Math.round(wheelA/step)%n)+n)%n;$('#stateOut').textContent=engaged?'indexing':'dwell';$('#angleOut').textContent=(wheelA*180/Math.PI).toFixed(1)+'°';$('#dwellOut').textContent=((1-window/Math.PI)*100).toFixed(0)+'%'}
function tick(){if(playing)t+=0.035*(+ui.speed.value);draw();requestAnimationFrame(tick)}Object.values(ui).forEach(el=>el.addEventListener?.('input',draw));ui.play.onclick=()=>{playing=!playing;ui.play.textContent=playing?'Pause':'Play'};tick();
</script></body></html>
