<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Cam Follower Lab — InnovationLab</title><style>
:root{color-scheme:dark;--line:#28405f;--text:#eaf2ff;--muted:#9fb0cc;--cyan:#7dd3fc;--pink:#f472b6;--green:#86efac;--yellow:#fde68a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 35% -10%,#254c82,#07101e 58%);color:var(--text);font-family:Inter,system-ui,sans-serif}.shell{max-width:1120px;margin:0 auto;padding:28px}.crumb{color:var(--muted);text-decoration:none}h1{font-size:clamp(32px,5vw,56px);margin:16px 0 8px}.lead{max-width:760px;color:var(--muted);line-height:1.55;font-size:18px}.layout{display:grid;grid-template-columns:1.35fr .65fr;gap:18px;margin-top:22px}.card{background:linear-gradient(180deg,#101d33,#0a1424);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 24px 60px #0007}.stage{width:100%;min-height:610px;border-radius:18px;background:radial-gradient(circle at 50% 45%,#162a49,#06101e 72%);border:1px solid #203755}.controls{display:grid;gap:15px}.row label{display:flex;justify-content:space-between;color:var(--muted);font-size:14px;margin-bottom:8px}input,select{width:100%;accent-color:var(--cyan)}select{background:#081524;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px}.btn{border:0;border-radius:999px;padding:10px 14px;background:var(--cyan);color:#06101c;font-weight:800;cursor:pointer}.readout{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{border:1px solid #213852;background:#081524;border-radius:14px;padding:10px}.metric b{display:block;color:var(--yellow)}.cam{fill:#7dd3fc;stroke:#06101c;stroke-width:2}.follower{fill:#86efac;stroke:#06101c;stroke-width:2}.guide{stroke:#94a3b8;stroke-width:4}.spring{fill:none;stroke:#f472b6;stroke-width:2}.trace{fill:none;stroke:#fde68a;stroke-width:2}.tag{display:inline-block;border:1px solid #355b7d;border-radius:999px;padding:4px 9px;color:#bdddff;font-size:12px;margin:4px 4px 0 0}@media(max-width:900px){.layout{grid-template-columns:1fr}.stage{min-height:440px}}
</style></head><body><main class="shell"><a class="crumb" href="../../">← InnovationLab</a><h1>Cam Follower Lab</h1><p class="lead">A rotating cam converts angular motion into programmed follower lift. This sketch supports simple eccentric, dwell-rise-return, and double-lobe profiles.</p><section class="layout"><article class="card"><svg id="stage" class="stage" viewBox="-115 -120 230 240"><path id="liftTrace" class="trace"/><g id="scene"></g></svg></article><aside class="card controls"><h2>Controls</h2><div class="row"><label><span>Profile</span><b id="profileLabel">Dwell-rise-return</b></label><select id="profile"><option value="drr">Dwell-rise-return</option><option value="eccentric">Eccentric</option><option value="double">Double lobe</option></select></div><div class="row"><label><span>Base radius</span><b><span id="baseVal">42</span> mm</b></label><input id="base" type="range" min="25" max="55" value="42"/></div><div class="row"><label><span>Lift</span><b><span id="liftVal">28</span> mm</b></label><input id="lift" type="range" min="8" max="45" value="28"/></div><div class="row"><label><span>Roller radius</span><b><span id="rollerVal">10</span> mm</b></label><input id="roller" type="range" min="5" max="18" value="10"/></div><div class="row"><label><span>Speed</span><b><span id="speedVal">1.0×</span></b></label><input id="speed" type="range" min="0" max="3" value="1" step="0.1"/></div><button id="play" class="btn">Pause</button><div class="readout"><div class="metric"><span>Lift now</span><b id="liftOut">—</b></div><div class="metric"><span>Phase</span><b id="phaseOut">—</b></div></div><p><span class="tag">programmed motion</span><span class="tag">cam profile</span></p></aside></section></main><script>
const $=s=>document.querySelector(s), scene=$('#scene'), trace=$('#liftTrace'), ui={profile:$('#profile'),base:$('#base'),lift:$('#lift'),roller:$('#roller'),speed:$('#speed'),play:$('#play')};let t=0,playing=true;
function smooth(x){return x*x*(3-2*x)} function liftAt(a){const L=+ui.lift.value, mode=ui.profile.value, u=((a%(2*Math.PI))+2*Math.PI)%(2*Math.PI)/(2*Math.PI); if(mode==='eccentric')return L*(0.5+0.5*Math.sin(a)); if(mode==='double')return L*(0.5+0.5*Math.sin(2*a)); if(u<.25)return 0; if(u<.5)return L*smooth((u-.25)/.25); if(u<.72)return L; return L*(1-smooth((u-.72)/.28));}
function camPath(){const base=+ui.base.value, pts=[];for(let i=0;i<220;i++){const a=i/220*Math.PI*2;const r=base+liftAt(a);pts.push(`${i?'L':'M'}${(r*Math.cos(a)).toFixed(2)},${(r*Math.sin(a)).toFixed(2)}`)}return pts.join(' ')+'Z'}
function drawTrace(){let d='';for(let i=0;i<=120;i++){const x=-95+i*1.55,y=104-liftAt(i/120*Math.PI*2)*1.6;d+=`${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`}trace.setAttribute('d',d)}
function spring(x,y1,y2){let d=`M${x},${y1}`;for(let i=1;i<12;i++){const y=y1+(y2-y1)*i/12;d+=`L${x+(i%2?6:-6)},${y}`}return d+`L${x},${y2}`}
function draw(){const base=+ui.base.value,L=+ui.lift.value,R=+ui.roller.value,speed=+ui.speed.value, lift=liftAt(t), followerY=-(base+L+R+18+lift);scene.innerHTML=`<g transform="rotate(${t*180/Math.PI})"><path class="cam" d="${camPath()}"/><circle fill="#06101e" stroke="#f8fafc" r="4"/></g><line class="guide" x1="0" y1="-112" x2="0" y2="-25"/><path class="spring" d="${spring(28,-105,followerY+18)}"/><rect class="follower" x="-16" y="${followerY-24}" width="32" height="34" rx="5"/><circle class="follower" cx="0" cy="${followerY+R}" r="${R}"/><line stroke="#fde68a" stroke-width="2" x1="0" y1="${followerY+R}" x2="0" y2="${-(base+lift)}"/>`;$('#baseVal').textContent=base;$('#liftVal').textContent=L;$('#rollerVal').textContent=R;$('#speedVal').textContent=speed.toFixed(1)+'×';$('#liftOut').textContent=lift.toFixed(1)+' mm';$('#phaseOut').textContent=((t*180/Math.PI)%360).toFixed(0)+'°';$('#profileLabel').textContent=ui.profile.options[ui.profile.selectedIndex].text;drawTrace()}
function tick(){if(playing)t+=0.035*(+ui.speed.value);draw();requestAnimationFrame(tick)}Object.values(ui).forEach(el=>el.addEventListener?.('input',draw));ui.play.onclick=()=>{playing=!playing;ui.play.textContent=playing?'Pause':'Play'};tick();
</script></body></html>
