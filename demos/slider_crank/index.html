<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Slider-Crank Lab — InnovationLab</title><style>
:root{color-scheme:dark;--bg:#07101e;--card:#101d33;--line:#28405f;--text:#eaf2ff;--muted:#9fb0cc;--cyan:#7dd3fc;--pink:#f472b6;--green:#86efac;--yellow:#fde68a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 35% -10%,#254c82,#07101e 58%);color:var(--text);font-family:Inter,system-ui,sans-serif}.shell{max-width:1120px;margin:0 auto;padding:28px}.crumb{color:var(--muted);text-decoration:none}h1{font-size:clamp(32px,5vw,56px);margin:16px 0 8px}.lead{max-width:760px;color:var(--muted);line-height:1.55;font-size:18px}.layout{display:grid;grid-template-columns:1.35fr .65fr;gap:18px;margin-top:22px}.card{background:linear-gradient(180deg,#101d33,#0a1424);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 24px 60px #0007}.stage{width:100%;min-height:600px;border-radius:18px;background:radial-gradient(circle at 50% 45%,#162a49,#06101e 72%);border:1px solid #203755}.controls{display:grid;gap:15px}.row label{display:flex;justify-content:space-between;color:var(--muted);font-size:14px;margin-bottom:8px}input{width:100%;accent-color:var(--cyan)}.btn{border:0;border-radius:999px;padding:10px 14px;background:var(--cyan);color:#06101c;font-weight:800;cursor:pointer}.readout{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{border:1px solid #213852;background:#081524;border-radius:14px;padding:10px}.metric b{display:block;color:var(--yellow)}.axis{stroke:#315271;stroke-dasharray:2 3}.ground{stroke:#94a3b8;stroke-width:5}.crank{stroke:#7dd3fc;stroke-width:8;stroke-linecap:round}.rod{stroke:#f472b6;stroke-width:7;stroke-linecap:round}.slider{fill:#86efac;stroke:#06101c;stroke-width:2}.joint{fill:#f8fafc;stroke:#06101c;stroke-width:1.5}.trace{fill:none;stroke:#fde68a;stroke-width:2;stroke-dasharray:4 6}.tag{display:inline-block;border:1px solid #355b7d;border-radius:999px;padding:4px 9px;color:#bdddff;font-size:12px;margin:4px 4px 0 0}@media(max-width:900px){.layout{grid-template-columns:1fr}.stage{min-height:440px}}
</style></head><body><main class="shell"><a class="crumb" href="../../">← InnovationLab</a><h1>Slider-Crank Lab</h1><p class="lead">Classic rotary-to-linear conversion: crank rotation drives a connecting rod and horizontal slider/piston. Useful for engines, pumps, presses, and quick-return concepts.</p><section class="layout"><article class="card"><svg id="stage" class="stage" viewBox="-90 -95 260 180"><line class="axis" x1="-80" y1="0" x2="160" y2="0"/><path id="trace" class="trace"/><g id="scene"></g></svg></article><aside class="card controls"><h2>Controls</h2><div class="row"><label><span>Crank radius</span><b><span id="rVal">32</span> mm</b></label><input id="r" type="range" min="15" max="55" value="32" step="1"/></div><div class="row"><label><span>Rod length</span><b><span id="lVal">100</span> mm</b></label><input id="l" type="range" min="60" max="150" value="100" step="1"/></div><div class="row"><label><span>Offset</span><b><span id="oVal">0</span> mm</b></label><input id="o" type="range" min="-35" max="35" value="0" step="1"/></div><div class="row"><label><span>Speed</span><b><span id="sVal">1.0×</span></b></label><input id="speed" type="range" min="0" max="3" value="1" step="0.1"/></div><button id="play" class="btn">Pause</button><div class="readout"><div class="metric"><span>Slider X</span><b id="xOut">—</b></div><div class="metric"><span>Stroke</span><b id="strokeOut">—</b></div><div class="metric"><span>Rod angle</span><b id="rodOut">—</b></div><div class="metric"><span>Velocity</span><b id="velOut">—</b></div></div><p><span class="tag">rotary → linear</span><span class="tag">piston</span></p></aside></section></main><script>
const $=s=>document.querySelector(s), ui={r:$('#r'),l:$('#l'),o:$('#o'),speed:$('#speed'),play:$('#play')}; let t=0,lastX=0,playing=true; const scene=$('#scene'), trace=$('#trace');
function solve(a){const r=+ui.r.value,l=+ui.l.value,o=+ui.o.value;const cx=r*Math.cos(a), cy=r*Math.sin(a);const dy=cy-o;const root=Math.sqrt(Math.max(l*l-dy*dy,0));return {A:{x:0,y:0},B:{x:cx,y:cy},C:{x:cx+root,y:o},r,l,o};}
function drawTrace(){let d='';for(let i=0;i<=360;i+=4){const p=solve(i*Math.PI/180).C;d+=`${d?'L':'M'}${p.x.toFixed(2)},${p.y.toFixed(2)}`}trace.setAttribute('d',d)}
function draw(){const p=solve(t), x=p.C.x, v=x-lastX; lastX=x; scene.innerHTML=`<line class="ground" x1="-70" y1="${p.o}" x2="155" y2="${p.o}"/><circle class="ground" cx="0" cy="0" r="${p.r}" fill="none" opacity=".35"/><line class="crank" x1="0" y1="0" x2="${p.B.x}" y2="${p.B.y}"/><line class="rod" x1="${p.B.x}" y1="${p.B.y}" x2="${p.C.x}" y2="${p.C.y}"/><rect class="slider" x="${p.C.x-16}" y="${p.C.y-13}" width="32" height="26" rx="5"/><circle class="joint" cx="0" cy="0" r="4"/><circle class="joint" cx="${p.B.x}" cy="${p.B.y}" r="4"/><circle class="joint" cx="${p.C.x}" cy="${p.C.y}" r="4"/>`; $('#rVal').textContent=p.r;$('#lVal').textContent=p.l;$('#oVal').textContent=p.o;$('#sVal').textContent=(+ui.speed.value).toFixed(1)+'×';$('#xOut').textContent=x.toFixed(1);$('#strokeOut').textContent=(2*p.r).toFixed(1);$('#rodOut').textContent=(Math.atan2(p.C.y-p.B.y,p.C.x-p.B.x)*180/Math.PI).toFixed(1)+'°';$('#velOut').textContent=v.toFixed(2)}
function tick(){if(playing)t+=0.035*(+ui.speed.value);draw();requestAnimationFrame(tick)} Object.values(ui).forEach(el=>el.addEventListener?.('input',()=>{drawTrace();draw()}));ui.play.onclick=()=>{playing=!playing;ui.play.textContent=playing?'Pause':'Play'};drawTrace();tick();
</script></body></html>
